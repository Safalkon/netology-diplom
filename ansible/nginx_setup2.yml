---
- name: Ожидание SSH на bastion
  hosts: bastion
  gather_facts: no
  tasks:
    - name: Ждём, пока bastion ответит на SSH
      wait_for:
        host: "{{ ansible_host }}"
        port: 22
        delay: 10
        timeout: 300

- name: Configure Nginx web servers with static site and stub_status
  hosts: web_servers
  become: yes
  gather_facts: yes

  vars:
    site_root: /var/www/html
    nginx_user: www-data
    nginx_group: www-data

  tasks:
    - name: Ensure nginx is installed
      apt:
        name: nginx
        state: present
        update_cache: yes
      when: ansible_os_family == "Debian"

    - name: Remove default nginx site (if exists)
      file:
        path: /etc/nginx/sites-enabled/default
        state: absent

    - name: Create site directory
      file:
        path: "{{ site_root }}"
        state: directory
        owner: "{{ nginx_user }}"
        group: "{{ nginx_group }}"
        mode: '0755'

    - name: Create index.html from template
      template:
        src: templates/index.html.j2
        dest: "{{ site_root }}/index.html"
        owner: "{{ nginx_user }}"
        group: "{{ nginx_group }}"
        mode: '0644'

    - name: Configure stub_status endpoint
      copy:
        dest: /etc/nginx/conf.d/status.conf
        content: |
          server {
              listen 127.0.0.1:80;
              server_name localhost;

              location /nginx_status {
                  stub_status;
                  allow 127.0.0.1;
                  deny all;
              }
          }
        owner: root
        group: root
        mode: '0644'
      notify: reload nginx

    - name: Validate nginx configuration
      command: nginx -t
      register: nginx_test
      changed_when: false
      failed_when: nginx_test.rc != 0

    - name: Ensure nginx is started and enabled
      systemd:
        name: nginx
        state: started
        enabled: yes

  handlers:
    - name: reload nginx
      systemd:
        name: nginx
        state: reloaded